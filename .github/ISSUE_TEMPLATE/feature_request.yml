name: Feature request
description: Suggest an idea for Engram
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Engram doesn't help with yet?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
